name: CI

# Pre-merge gate. The Integrator (sole publisher) pushes each wp/<ID> branch and
# opens a PR; these checks are REQUIRED status checks in branch protection, so a
# branch can't merge until they're green (docs/ops/github-setup.md, WP F1). This
# is the compute offload: the heavy jobs run on GitHub runners, not the laptop.
# No merge_group — one publisher serialises merges, so there's no queue.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel superseded runs on the same PR/ref so rapid pushes don't pile up CI
# (matters even though public-repo Actions minutes are free — it shortens queues).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: build + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Dependency/target cache. Before this, every run cold-compiled the whole
      # graph — including cranelift-codegen/frontend/jit/module — which
      # dominated a 36-48 minute wall clock. Keyed on Cargo.lock + rustc
      # version, so a dependency change invalidates it and correctness of the
      # `--locked` gate is unaffected: this changes only what is recompiled,
      # never what is compiled or tested.
      # NOTE: do NOT split this job into a per-crate matrix without measuring
      # first — each matrix job would pay this same dependency build again,
      # multiplying the dominant cost rather than dividing it. See
      # docs/program/11-test-suite-and-ci-remediation.md §1.
      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ken-ci
      - name: Build
        run: cargo build --workspace --locked
      # Prebuilt binary, not `cargo install cargo-nextest` — the latter
      # would compile nextest itself on every run and add minutes back.
      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest
      # nextest schedules every test across every binary against one global
      # thread pool, replacing `cargo test`'s serial per-binary walk (200
      # binaries, one at a time — the dominant cost once C1's cache made the
      # build itself cheap). See docs/program/11-test-suite-and-ci-remediation.md
      # §3 (C2). It also gives per-test timing, which is the instrumentation
      # C4 needs.
      #
      # SKIPPED HERE, FOR RUN TIME — NOT BECAUSE THEY ARE BROKEN OR FLAKY:
      # three binaries (nine tests) measured at 56.5% of a 47-minute CI run
      # (docs/program/11-test-suite-and-ci-remediation.md §1/§3):
      #   - crates/ken-cli/tests/rt_parity_native.rs        (14m41s, 7 tests)
      #   - crates/ken-cli/tests/px8f_buffer_native.rs      ( 5m10s, 1 test)
      #   - crates/ken-verify/tests/px8f_write_partition.rs ( 5m09s, 1 test)
      # This is a deliberate, operator-directed expedient trading coverage for
      # gate speed; lost coverage is tracked in
      # docs/program/issues/CI-SKIPPED-NATIVE-TESTS.md. To restore them,
      # delete the `-E` argument below — that is the entire, one-edit undo.
      - name: Test
        run: >-
          cargo nextest run --workspace --locked
          -E 'not (binary(rt_parity_native) or binary(px8f_buffer_native) or binary(px8f_write_partition))'
      # No `cargo test --workspace --doc --locked` step: nextest does not run
      # doctests, but this workspace has none to lose. Every ``` fence inside
      # a `///`/`//!` doc comment under crates/ is opened ```text (rustdoc's
      # explicit non-Rust marker), so `cargo test --doc` collects zero tests
      # today (checked via `grep -rn '```' crates/ --include=*.rs` — every
      # opening fence is `text`). If a real ```rust doctest is ever added,
      # add a `cargo test --workspace --doc --locked` step back here.

  conformance:
    name: conformance suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # TODO(F2/Team Spec): run the black-box conformance corpus once it exists.
      - name: Conformance (placeholder)
        run: echo "conformance suite not yet implemented (WP F2)"

  clean-room:
    name: clean-room provenance check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # TODO(F1/Team Foundation): scan for AGPL license headers / known prototype
      # source markers in implementation crates. Start as a denylist + manual
      # review; tighten over time. See CLEAN-ROOM.md.
      - name: Clean-room scan (placeholder)
        run: echo "clean-room provenance scan not yet implemented (WP F1)"

  path-guard:
    name: path-guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # TODO(F1/Team Foundation): SOFT attribution guard — map the branch's team
      # (from prefix `wp/<ID>-` or a `team:*` label) to its allowed paths; if it
      # touches outside them, don't hard-fail — surface it so the owning area's
      # reviewer is pulled onto the merge Decision (CODEOWNERS is inert in the
      # single-publisher model). Cross-cutting edits are normal; never block them.
      # See docs/program/04-git-and-integration.md.
      - name: Path guard (placeholder)
        run: echo "path-guard not yet implemented (WP F1)"

  issue-tracker:
    name: work-item tracker (schema + regeneration)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Schema gate: every docs/program/issues/*.md file has all required
      # frontmatter fields, a valid `status`, an `id` matching its filename,
      # no duplicate `id`, and every depends_on/blocks reference resolves.
      - name: Validate issue schema
        run: scripts/check-issue-schema.sh
      # Regeneration gate: docs/program/IMPLEMENTATION-PROGRESS.md is fully
      # derived from docs/program/issues/*.md — this fails if the committed
      # file is stale (regeneration must be idempotent modulo the timestamp
      # line; see scripts/gen-progress.sh).
      - name: Check IMPLEMENTATION-PROGRESS.md is current
        run: scripts/gen-progress.sh --check
