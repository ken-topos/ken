name: CI

# Gates every PR to `main`. These checks are intended to be REQUIRED status
# checks in branch protection (configure when the GitHub repo is created, WP F1).

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build-test:
    name: build + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: cargo build --workspace --locked
      - name: Test
        run: cargo test --workspace --locked

  conformance:
    name: conformance suite
    runs-on: ubuntu-latest
    steps:
