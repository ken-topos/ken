name: CI

# Pre-merge gate. The Integrator (sole publisher) pushes each wp/<ID> branch and
# opens a PR; these checks are REQUIRED status checks in branch protection, so a
# branch can't merge until they're green (docs/ops/github-setup.md, WP F1). This
# is the compute offload: the heavy jobs run on GitHub runners, not the laptop.
# No merge_group — one publisher serialises merges, so there's no queue.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel superseded runs on the same PR/ref so rapid pushes don't pile up CI
# (matters even though public-repo Actions minutes are free — it shortens queues).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # The suite is CPU-bound, not scheduling-bound. Measured on run
  # 29838398785: 1891 tests, 3893 CPU-seconds of real work, executed in 984s
  # wall on a 4-vCPU runner — an effective parallelism of 3.96x out of a
  # theoretical 4.00. nextest was already saturating the machine, so no
  # further scheduling change can help. The only two levers left are LESS
  # WORK (see `opt-level` in the root Cargo.toml) and MORE CORES — which is
  # what this matrix buys: 4 shards x 4 vCPU = 16 effective cores.
  #
  # Sharding is by TEST, not by crate. A per-crate matrix would floor at the
  # slowest crate (`ken-cli` holds the heaviest binaries);
  # `--partition count:N/4` ignores crate boundaries and balances by count.
  #
  # This trades ~4x total compute for ~4x wall clock. Actions minutes are
  # free on public repos, so the trade is worth it — but it IS a real
  # increase in compute, not a free win.
  # See docs/program/11-test-suite-and-ci-remediation.md §1/§3.
  test-shard:
    name: test shard ${{ matrix.shard }}/4
    runs-on: ubuntu-latest
    strategy:
      # Do not cancel siblings on first failure — a full picture of which
      # shards failed is worth more than the saved minutes, and shards are
      # independent.
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    steps:
      - uses: actions/checkout@v4
      # NO dependency cache, deliberately. `Swatinem/rust-cache` was removed
      # (item C8): it never measurably helped — the build step is well under
      # a minute either way — and it is third-party code with access to the
      # build, i.e. supply-chain surface taken on for nothing. A dependency
      # has to earn its place. If a future change makes the build genuinely
      # expensive, prefer first-party `actions/cache` and re-argue the case
      # on measured numbers.
      - name: Build
        run: cargo build --workspace --locked
      # Prebuilt binary, not `cargo install cargo-nextest` — the latter
      # would compile nextest itself on every run and add minutes back.
      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest
      # nextest schedules every test across every binary against one global
      # thread pool. NOTE: `cargo test` was ALREADY parallel *within* each
      # binary (libtest defaults to one thread per CPU); only the 200 binaries
      # themselves ran serially. So nextest recovered just the inter-binary
      # waste — measured at ~11% (18m26s -> 16m24s on the same test set), not
      # the large win it was first written up as. It is kept because it
      # partitions (below) and because it reports per-test timing.
      #
      # EXCLUDED FROM THE SHARDED LANE — NOT BECAUSE THEY ARE BROKEN OR
      # FLAKY, but because each does a full native codegen-and-link per test
      # case and would dominate whichever shard drew it. Measured at 56.5% of
      # a 47-minute run (docs/program/11-test-suite-and-ci-remediation.md §1):
      #   - crates/ken-cli/tests/rt_parity_native.rs        (14m41s, 7 tests)  SKIPPED
      #   - crates/ken-cli/tests/px8f_buffer_native.rs      ( 5m10s, 1 test)   SKIPPED
      #   - crates/ken-verify/tests/px8f_write_partition.rs ( 5m09s, 1 test)   RESTORED
      #
      # `px8f_write_partition` is no longer skipped — it runs in the
      # `native-slow` job below, in parallel, where it costs no wall clock.
      # It stays in this exclusion so it is not ALSO drawn into a shard: the
      # exclusion here and the inclusion there must stay complementary, or
      # the test is either duplicated or dropped.
      # Remaining lost coverage: docs/program/issues/CI-SKIPPED-NATIVE-TESTS.md.
      - name: Test
        run: >-
          cargo nextest run --workspace --locked
          --partition count:${{ matrix.shard }}/4
          -E 'not (binary(rt_parity_native) or binary(px8f_buffer_native) or binary(px8f_write_partition))'
      # No `cargo test --workspace --doc --locked` step: nextest does not run
      # doctests, but this workspace has none to lose. Every ``` fence inside
      # a `///`/`//!` doc comment under crates/ is opened ```text (rustdoc's
      # explicit non-Rust marker), so `cargo test --doc` collects zero tests
      # today (checked via `grep -rn '```' crates/ --include=*.rs` — every
      # opening fence is `text`). If a real ```rust doctest is ever added,
      # add a `cargo test --workspace --doc --locked` step back here.

  # One slow native binary, restored to the gate in its own job.
  #
  # WHY A SEPARATE JOB rather than letting it back into the shards: it is a
  # SINGLE #[test] taking ~5 minutes, so no scheduler can subdivide it. In a
  # shard it would simply become that shard's critical path and push the
  # whole gate out by ~2 minutes. Alone and in parallel it costs NOTHING:
  # the worst shard is ~471s (65s build + 406s tests) and this job is ~374s
  # (65s build + ~309s test), so it finishes first and never sets the pace.
  #
  # That headroom is the budget for restoring the others. `px8f_buffer_native`
  # (~310s, also a single test) fits the same way and is the obvious next one.
  # `rt_parity_native` (14m41s, 7 tests) does NOT — it would roughly double
  # the gate on its own, and it needs to get faster before it comes back.
  #
  # ⚠ ITS FILTER MUST STAY COMPLEMENTARY TO THE SHARD EXCLUSION ABOVE.
  # The binary is named in both places: excluded there, included here. Change
  # one without the other and the test is silently duplicated or silently
  # dropped — and a dropped test still shows a green gate.
  native-slow:
    name: native-slow (px8f_write_partition)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # No cache here either — see the note in the sharded job (item C8).
      - name: Build
        run: cargo build --workspace --locked
      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest
      - name: Test
        run: >-
          cargo nextest run --workspace --locked
          -E 'binary(px8f_write_partition)'

  # ⛔ DO NOT RENAME OR DELETE THIS JOB. `build + test` is a REQUIRED status
  # check in branch protection (docs/ops/github-setup.md §"Required status
  # checks"). The sharded matrix above publishes checks named `test shard
  # N/4`, which branch protection does not know about — so if this
  # name-preserving aggregator were removed, the required check would never
  # report and EVERY pull request would become unmergeable until an admin
  # edited branch protection. This job exists so the workflow can be resharded
  # freely without touching repository settings: change the matrix, leave this
  # alone.
  #
  # It is intentionally a pure gate — no checkout, no build, a few seconds.
  #
  # ⚠ EVERY TEST-RUNNING JOB MUST BE LISTED IN `needs` AND CHECKED BELOW.
  # This job is what branch protection actually reads, so a test job missing
  # from here reports GREEN no matter how it failed. Add a job above, add it
  # in both places here.
  build-test:
    name: build + test
    runs-on: ubuntu-latest
    needs: [test-shard, native-slow]
    # `always()` so this reports a definite conclusion even when a job fails
    # or is skipped. Without it, a failed dependency leaves this job *skipped*,
    # and a skipped required check blocks the PR with no useful signal.
    if: always()
    steps:
      - name: All test jobs passed
        run: |
          shards='${{ needs.test-shard.result }}'
          native='${{ needs.native-slow.result }}'
          echo "test-shard matrix: $shards"
          echo "native-slow:       $native"
          failed=0
          if [ "$shards" != "success" ]; then
            echo "::error::One or more test shards did not pass ($shards)." >&2
            failed=1
          fi
          if [ "$native" != "success" ]; then
            echo "::error::native-slow did not pass ($native)." >&2
            failed=1
          fi
          exit "$failed"

  conformance:
    name: conformance suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # TODO(F2/Team Spec): run the black-box conformance corpus once it exists.
      - name: Conformance (placeholder)
        run: echo "conformance suite not yet implemented (WP F2)"

  clean-room:
    name: clean-room provenance check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # TODO(F1/Team Foundation): scan for AGPL license headers / known prototype
      # source markers in implementation crates. Start as a denylist + manual
      # review; tighten over time. See CLEAN-ROOM.md.
      - name: Clean-room scan (placeholder)
        run: echo "clean-room provenance scan not yet implemented (WP F1)"

  path-guard:
    name: path-guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # TODO(F1/Team Foundation): SOFT attribution guard — map the branch's team
      # (from prefix `wp/<ID>-` or a `team:*` label) to its allowed paths; if it
      # touches outside them, don't hard-fail — surface it so the owning area's
      # reviewer is pulled onto the merge Decision (CODEOWNERS is inert in the
      # single-publisher model). Cross-cutting edits are normal; never block them.
      # See docs/program/04-git-and-integration.md.
      - name: Path guard (placeholder)
        run: echo "path-guard not yet implemented (WP F1)"

  issue-tracker:
    name: work-item tracker (schema + regeneration)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Schema gate: every docs/program/issues/*.md file has all required
      # frontmatter fields, a valid `status`, an `id` matching its filename,
      # no duplicate `id`, and every depends_on/blocks reference resolves.
      - name: Validate issue schema
        run: scripts/check-issue-schema.sh
      # Regeneration gate: docs/program/IMPLEMENTATION-PROGRESS.md is fully
      # derived from docs/program/issues/*.md — this fails if the committed
      # file is stale (regeneration must be idempotent modulo the timestamp
      # line; see scripts/gen-progress.sh).
      - name: Check IMPLEMENTATION-PROGRESS.md is current
        run: scripts/gen-progress.sh --check
