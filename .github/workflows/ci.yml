name: CI

# Gates every PR to `main`. These checks are intended to be REQUIRED status
# checks in branch protection (configure when the GitHub repo is created, WP F1).

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  merge_group:            # run on the merge queue too, against latest main

# Cancel superseded runs on the same PR/ref so rapid pushes don't pile up CI
# (matters even though public-repo Actions minutes are free — it shortens queues).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: build + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: cargo build --workspace --locked
      - name: Test
        run: cargo test --workspace --locked

  conformance:
    name: conformance suite
    runs-on: ubuntu-latest
