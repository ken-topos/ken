name: CI

# Pre-merge gate. The Integrator (sole publisher) pushes each wp/<ID> branch and
# opens a PR; these checks are REQUIRED status checks in branch protection, so a
# branch can't merge until they're green (docs/ops/github-setup.md, WP F1). This
# is the compute offload: the heavy jobs run on GitHub runners, not the laptop.
# No merge_group — one publisher serialises merges, so there's no queue.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel superseded runs on the same PR/ref so rapid pushes don't pile up CI
# (matters even though public-repo Actions minutes are free — it shortens queues).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: build + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: cargo build --workspace --locked
      - name: Canonical Ken source
        run: >-
          cargo run -p ken-cli -- fmt --check
          $(find catalog -type f -name '*.ken.md' | sort)
          catalog/packages/Capability/Verify/ProofErasureBoundaryChecker.ken
          $(find examples/rosetta -type f -name '*.ken' | sort)
      - name: Test
        run: cargo test --workspace --locked

  conformance:
    name: conformance suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # TODO(F2/Team Spec): run the black-box conformance corpus once it exists.
      - name: Conformance (placeholder)
        run: echo "conformance suite not yet implemented (WP F2)"

  clean-room:
