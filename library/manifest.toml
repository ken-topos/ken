  "spec/20-verification/21-spec-syntax.md#52-the-epistemic-status-per-claim-export-facing--oq-spec-decided",
  "spec/20-verification/21-spec-syntax.md#53-how-the-verdict-and-the-status-relate-the-projection",
  "spec/30-surface/33-declarations.md#321-admission-boundary-headers",
