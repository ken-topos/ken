# library/manifest.toml — the inventory of every library/ document.
#
# Every document under library/ MUST have exactly one [[document]] entry
# here (Wave 0 gate 1, docs/program/12-documentation-program.md §2: "a page
# whose authority class you cannot name is not ready to land"). A gate
# fails the build if a library/*.md file has no entry, or an entry's path
# does not exist.
#
# Field meaning (research/librarian-documentation-program-proposal.md,
# "Suggested manifest record"):
#   path          repo-relative path to the document
#   kind          the document's shape: portal, explanatory, tutorial,
#                 how-to, status, reference
#   audience      who the document is for
#   authority     exactly one of: derived-reference, explanatory, tutorial,
#                 how-to, status, normative-pointer (D1 — the closed set)
#   availability  exactly one of: current, partial, planned, unavailable
#   sources       "path" or "path#anchor" this document is grounded in;
#                 an anchor must name a real heading in the target file
#                 (gate 3) — this is the drift gate D1 requires
#   validation    the CLOSED set of gate names that apply to this record:
#                 manifest-coverage, manifest-completeness, links,
#                 source-anchors, availability-label, authority-class
#                 (all documents), plus EITHER source-currency (every
#                 non-status document — every cited source is unchanged
#                 since REVISION) OR generated-current (status docs only
#                 — always regenerated fresh, so idempotency subsumes
#                 source-currency for it) — see KNOWN_VALIDATION_TOKENS
#                 in crates/ken-cli/tests/library_documentation_gates.rs,
#                 the single source of truth for this vocabulary
#   owner         the team responsible
#
# library/REVISION holds the explicit, hand-set validated repository
# revision library/STATUS.md is generated against (scripts/gen-doc-
# status.sh) — never derived from live `git rev-parse HEAD`, which is
# self-referential for the commit that updates STATUS.md itself.

[[document]]
path = "library/README.md"
kind = "portal"
audience = ["human-reader"]
authority = "explanatory"
availability = "current"
sources = [
  "docs/program/12-documentation-program.md#1-the-four-decisions--settled",
]
validation = [
  "manifest-coverage",
  "manifest-completeness",
  "links",
  "source-anchors",
  "availability-label",
  "authority-class",
  "source-currency",
]
owner = "doc"

