[[document]]
path = "library/STATUS.md"
kind = "status"
audience = ["human-reader", "agent-reader"]
authority = "status"
availability = "current"
sources = ["library/manifest.toml", "library/REVISION"]
validation = [
  "manifest-coverage",
  "manifest-completeness",
  "links",
  "source-anchors",
  "availability-label",
  "authority-class",
  "generated-current",
]
owner = "doc"
