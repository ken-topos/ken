# ken federation — moot launch profile (Anthropic direct + one claudex route).
#
# Default: EVERY role runs DIRECT on the Anthropic subscription (OAuth via the
# steward's cold-start /login) — enclave on claude-opus-4-8[1m], all build /
# coordination roles on claude-sonnet-5. No `env`, no proxy.
#
# ONE EXCEPTION — foundation-implementer routes through the local **claudex**
# proxy (127.0.0.1:13456) to the operator's ChatGPT/Codex subscription, landing
# on GPT-5.6-luna (T2). See its `env` block below. This lets us spend OpenAI
# subscription tokens on one build seat without changing the harness (it's still
# Claude Code — `model` stays claude-sonnet-5 as the harness selector; the env
# redirects the actual upstream model to the gpt-5.6 family via claudex).
# (Per-role `env` requires mootup >= 0.5.4.)
#
# PRECONDITION: the claudex proxy must be running on :13456 before launch —
#   nohup claudex-config proxy start --port 13456 > /tmp/claudex-proxy.log 2>&1 &
# (config at ~/.config/claudex/config.toml, profile codex-sub; OAuth via
# `claudex-config auth login chatgpt --profile codex-sub`). Verified 2026-07-10:
# sonnet slot -> gpt-5.6-luna, haiku slot -> gpt-5.6-terra, both 200 end-to-end.

[convo]
api_url = "https://mootup.io"
space_id = "spc_4q7g0se87rgje"

[harness]
# Cold-start role: launched first on `moot up`, used for the interactive
# Anthropic OAuth /login (an Opus/subscription enclave role). The operator's
# primary proxy into the federation.
human_interface = "steward"

# Launch-cascade pacing. mootup defaults this to 2.0s/agent to avoid storming
# the convo join_space endpoint on cold start; we disable it (0) because the
# server-side rate limit was relaxed 10x and the box (t3.small) peaked at ~35%
# CPU under the full 25-agent burst — so the stagger only slows launch for no
# benefit. Re-enable (e.g. 1-2s) if a future, larger fleet herds join_space.
launch_stagger_seconds = 30

[agents.spec-author]
display_name = "spec-author"
model = "gpt-5.6-sol"
harness = "codex"
model_reasoning_effort = "high"
startup_prompt = "You are Ken's spec author (clean-room enclave). Read agent/COORDINATION.md (federation law) and MODELS.md first. Read agent/playbooks/spec/spec-author.md and CLEAN-ROOM.md, set your status, and await the spec leader's kickoff. Do not poll."

[agents.conformance-validator]
display_name = "conformance-validator"
model = "gpt-5.6-sol"
harness = "codex"
model_reasoning_effort = "high"
startup_prompt = "You are Ken's conformance validator (clean-room enclave). Read agent/COORDINATION.md (federation law) and MODELS.md first. Read agent/playbooks/spec/conformance-validator.md and CLEAN-ROOM.md, set status, await kickoff. Do not poll."

[agents.steward]
display_name = "steward"
model = "claude-opus-4-8[1m]"
effort = "high"
startup_prompt = "You are Ken's Steward (operator proxy, workflow authority). Read agent/COORDINATION.md (federation law) and MODELS.md first. Read agent/playbooks/federation/steward.md and docs/program/05-implementation-dag.md, then begin tracking program progress per your playbook."

