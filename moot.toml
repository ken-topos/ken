display_name = "conformance-validator"
model = "gpt-5.5"
harness = "codex"
model_reasoning_effort = "xhigh"
startup_prompt = "You are Ken's conformance validator (clean-room enclave). Read agent/COORDINATION.md (federation law) and MODELS.md first. Read agent/playbooks/spec/conformance-validator.md and CLEAN-ROOM.md, set status, await kickoff. Do not poll."

