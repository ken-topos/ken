# ken federation — moot launch profile (hybrid routing).
#
# Enclave (Opus) runs DIRECT on the Anthropic subscription (OAuth) — no `env`.
# Build tiers route through the local LLM proxy (127.0.0.1:8090) via each role's
# `env` below: ANTHROPIC_BASE_URL + ANTHROPIC_AUTH_TOKEN = `${secret:llm-proxy-secret}`
# (resolved by moot from /home/node/.secrets at launch). It MUST be AUTH_TOKEN, a
# Bearer — not ANTHROPIC_API_KEY: the proxy reads `Authorization: Bearer`, and
# AUTH_TOKEN also overrides the shared claude.ai OAuth login (from the enclave's
# /login) that would otherwise be sent and rejected as a subscription token. The
# proxy dispatches by model prefix: accounts/fireworks/* -> Fireworks (GLM),
# deepseek-* -> DeepSeek.
# (Per-role `env` requires mootup >= 0.5.4.)
#
# Model slugs: deepseek-v4-pro and accounts/fireworks/models/glm-5p2 confirmed by
# the operator (2026-06-28). The Opus enclave slug is still to confirm at first
# `moot up` — it runs direct on the Anthropic subscription, not via the proxy.

[convo]
api_url = "https://mootup.io"
space_id = "spc_4q7g0se87rgje"

[harness]
# Cold-start role: launched first on `moot up`, used for the interactive
# Anthropic OAuth /login (an Opus/subscription enclave role). The operator's
# primary proxy into the federation.
human_interface = "steward"

# Launch-cascade pacing. mootup defaults this to 2.0s/agent to avoid storming
# the convo join_space endpoint on cold start; we disable it (0) because the
# server-side rate limit was relaxed 10x and the box (t3.small) peaked at ~35%
# CPU under the full 25-agent burst — so the stagger only slows launch for no
# benefit. Re-enable (e.g. 1-2s) if a future, larger fleet herds join_space.
launch_stagger_seconds = 30

[agents.spec-author]
display_name = "spec-author"
model = "gpt-5.5"
harness = "codex"
model_reasoning_effort = "xhigh"
startup_prompt = "You are Ken's spec author (clean-room enclave). Read agent/COORDINATION.md (federation law) and MODELS.md first. Read agent/playbooks/spec/spec-author.md and CLEAN-ROOM.md, set your status, and await the spec leader's kickoff. Do not poll."

