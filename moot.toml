# ken federation — moot launch profile (hybrid routing).
#
# Enclave (Opus) runs DIRECT on the Anthropic subscription (OAuth); the build
# tiers route through the local LLM proxy (127.0.0.1:8090) by model prefix:
# accounts/fireworks/* -> Fireworks (GLM), deepseek-* -> DeepSeek. The proxy
# env is injected per-role by CONVO_ROLE (see .devcontainer/ken-setup.sh).
#
# Model slugs: deepseek-v4-pro and accounts/fireworks/models/glm-5p2 confirmed by
# the operator (2026-06-28). The Opus enclave slug is still to confirm at first
# `moot up` — it runs direct on the Anthropic subscription, not via the proxy.

[convo]
api_url = "https://mootup.io"
space_id = "spc_4q7g0se87rgje"

[harness]
# Cold-start role: launched first on `moot up`, used for the interactive
# Anthropic OAuth /login (an Opus/subscription enclave role). The operator's
# primary proxy into the federation.
human_interface = "steward"

[agents.spec-author]
display_name = "spec-author"
model = "claude-opus-4-8[1m]"
effort = "high"
startup_prompt = "You are Ken's spec author (clean-room enclave). Read agent/COORDINATION.md (federation law) and MODELS.md first. Read agent/playbooks/spec/spec-author.md and CLEAN-ROOM.md, set your status, and await the spec leader's kickoff. Do not poll."

[agents.conformance-validator]
display_name = "conformance-validator"
model = "claude-opus-4-8[1m]"
effort = "high"
startup_prompt = "You are Ken's conformance validator (clean-room enclave). Read agent/COORDINATION.md (federation law) and MODELS.md first. Read agent/playbooks/spec/conformance-validator.md and CLEAN-ROOM.md, set status, await kickoff. Do not poll."

[agents.steward]
display_name = "steward"
model = "claude-opus-4-8[1m]"
effort = "high"
startup_prompt = "You are Ken's Steward (operator proxy, workflow authority). Read agent/COORDINATION.md (federation law) and MODELS.md first. Read agent/playbooks/federation/steward.md and docs/program/05-implementation-dag.md, then begin tracking program progress per your playbook."

[agents.architect]
